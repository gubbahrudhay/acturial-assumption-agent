name: combined
version: 1

required_columns:
  - Policy_ID
  - Product
  - Region
  - Age
  - Premium
  - Exposure
  - Claim
  - Expected_Frequency
  - Claim_Amount
  - Expected_Severity
  - Policy_Start_Date
  - Policy_End_Date

optional_columns:
  - Distribution_Channel
  - Gender
  - Hospital_Code
  - Claim_Date

column_types:
  Policy_ID: string
  Product: string
  Region: string
  Age: integer
  Premium: float
  Exposure: float
  Claim: integer
  Expected_Frequency: float
  Claim_Amount: float
  Expected_Severity: float
  Policy_Start_Date: date
  Policy_End_Date: date
  Distribution_Channel: string
  Gender: string
  Hospital_Code: string
  Claim_Date: date

numeric_constraints:
  Premium:
    min: 0
  Exposure:
    min: 0
  Claim:
    min: 0
    max: 1
  Expected_Frequency:
    min: 0
    max: 1
  Claim_Amount:
    min: 0
  Expected_Severity:
    min: 0
  Age:
    min: 0
    max: 120

date_constraints:
  Policy_End_Date:
    after: Policy_Start_Date
